<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="todo-app.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <h1><i class="fas fa-tasks"></i> Todo App</h1>
            <div class="input-section">
                <input type="text" id="todoInput" placeholder="Add a new task...">
                <button id="addBtn"><i class="fas fa-plus"></i></button>
            </div>
            <ul id="todoList"></ul>
            <div class="stats">
                <span id="totalTasks">Total: 0</span>
                <span id="completedTasks">Completed: 0</span>
                <button id="clearCompleted"><i class="fas fa-trash"></i> Clear Completed</button>
            </div>
        </div>
    </div>
    <script src="todo-app.js"></script>
</body>
</html>
